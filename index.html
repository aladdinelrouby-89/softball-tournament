<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Definity Softball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EEF2F8; --card:#FBFCFE; --ink:#13315C; --ink2:#42597A;
  --line:#D5DFEC; --clay:#2E6FC2; --def:#2E6FC2; --def-bg:transparent;
  --gold:#B8862E; --muted:#7E8CA0;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:0 14px 80px}
.mono{font-family:"DM Mono",monospace;font-variant-numeric:tabular-nums}

/* header / lineup card */
header{padding:26px 0 14px}
.eyebrow{font-family:Oswald;font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:12px;color:var(--clay)}
h1{font-family:Anton;font-weight:400;letter-spacing:.01em;line-height:.9;
   font-size:clamp(34px,8.5vw,60px);margin:6px 0 6px;text-transform:uppercase}
h1 .of{color:var(--def)}
h1 .yr{display:block;font-size:.5em;color:var(--ink2);letter-spacing:.04em;margin-top:4px}
.sub{font-family:Oswald;font-weight:500;text-transform:uppercase;letter-spacing:.12em;
   font-size:13px;color:var(--ink2);display:flex;gap:14px;
